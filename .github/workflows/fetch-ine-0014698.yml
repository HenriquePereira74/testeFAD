name: Fetch INE 0014698

on:
  pull_request:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch INE data
        run: python3 scripts/fetch_ine_0014698.py

      - name: Show generated files
        run: ls -lah output

      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: ine-0014698-output
          path: output/*
          if-no-files-found: error
          retention-days: 7
