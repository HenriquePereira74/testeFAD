name: Fetch INE 0014668

on:
  push:
    paths:
      - .github/workflows/fetch-ine-0014668.yml
      - scripts/fetch_ine_0014668.py
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch INE data
        run: python3 scripts/fetch_ine_0014668.py

      - name: List outputs
        run: ls -lah output

      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: ine-0014668-output
          path: output/*
          if-no-files-found: error
